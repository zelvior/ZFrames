<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelvior ZFrames | Advanced Workspace</title>
    
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- Pro-Grade Color Palette --- */
        :root {
            --bg-primary: #0B0E11;
            --bg-surface: #1A1D21;
            --text-secondary: #7D8590;
            --text-primary: #EDEFF2;
            --accent: #D4AF37;
            --accent-hover: #F2C94C;
            --border-radius-card: 16px;
            --border-radius-pill: 9999px;
            
            font-family: Inter, sans-serif;
            font-feature-settings: 'liga' 1, 'calt' 1;
        }

        @supports (font-variation-settings: normal) {
            :root { font-family: InterVariable, sans-serif; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-primary); color: var(--text-primary);
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }
        code, pre, .code-font { font-family: 'JetBrains Mono', monospace; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: var(--border-radius-pill); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* --- Header --- */
        header {
            background-color: var(--bg-surface); padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(125, 133, 144, 0.15);
            flex-wrap: wrap; gap: 1rem;
        }

        .brand { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1.5rem; }
        .brand span { color: var(--accent); }
        .nav-controls { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        /* Pills */
        .btn {
            background-color: transparent; color: var(--text-primary);
            border: 1px solid var(--text-secondary); padding: 0.5rem 1rem;
            border-radius: var(--border-radius-pill); cursor: pointer;
            font-family: inherit; font-weight: 500; font-size: 0.9rem;
            transition: all 0.2s ease; display: flex; align-items: center; gap: 0.5rem;
            white-space: nowrap;
        }
        .btn:hover { border-color: var(--text-primary); background-color: rgba(237, 239, 242, 0.05); }
        
        .btn-primary { background-color: var(--accent); color: var(--bg-primary); border: none; font-weight: 700; }
        .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2); }

        /* --- Workspace Layout --- */
        main {
            flex: 1; padding: 1rem; display: grid; gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 400px), 1fr));
            align-content: start;
        }

        /* --- Frame Components --- */
        .frame-card {
            background-color: var(--bg-surface); border-radius: var(--border-radius-card);
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); border: 1px solid rgba(125, 133, 144, 0.1);
            height: clamp(450px, 65vh, 850px); 
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .frame-card:hover { box-shadow: 0 6px 25px rgba(0, 0, 0, 0.5); border-color: rgba(212, 175, 55, 0.3); }

        .frame-header {
            display: flex; padding: 0.6rem 0.75rem; background-color: rgba(11, 14, 17, 0.8);
            gap: 0.4rem; align-items: center; border-bottom: 1px solid rgba(125, 133, 144, 0.15);
        }

        .input-wrapper {
            flex: 1; display: flex; min-width: 0;
            background-color: var(--bg-primary); border: 1px solid rgba(125, 133, 144, 0.3);
            border-radius: var(--border-radius-pill); overflow: hidden;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }

        .url-input {
            width: 100%; background: transparent; border: none; color: var(--text-primary);
            padding: 0.5rem 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
            outline: none; min-width: 0;
        }

        .proxy-toggle {
            background: transparent; border: none; border-left: 1px solid rgba(125, 133, 144, 0.3);
            color: var(--text-secondary); padding: 0 0.75rem; cursor: pointer;
            display: flex; align-items: center; font-size: 0.75rem; font-weight: bold;
            transition: all 0.2s;
        }
        .proxy-toggle.active { color: var(--bg-primary); background-color: var(--accent); }
        .proxy-toggle:hover:not(.active) { color: var(--accent); background-color: rgba(212, 175, 55, 0.1); }

        .icon-btn {
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            padding: 0.4rem; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .icon-btn:hover { color: var(--text-primary); background-color: rgba(237, 239, 242, 0.1); }
        .icon-btn.close:hover { color: #ff4c4c; background-color: rgba(255, 76, 76, 0.1); }

        .iframe-container { flex: 1; position: relative; background-color: #ffffff; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 2; background-color: white; }

        .frame-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-primary); color: var(--text-secondary); z-index: 1;
            padding: 2rem; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
        }

        .spinner {
            width: 24px; height: 24px; border: 3px solid rgba(212, 175, 55, 0.3);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 1rem; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Footer --- */
        footer {
            background-color: var(--bg-surface); padding: 1.5rem; display: flex;
            justify-content: space-between; align-items: center; border-top: 1px solid rgba(125, 133, 144, 0.15);
            flex-wrap: wrap; gap: 1rem;
        }
        .credits { color: var(--text-secondary); font-size: 0.9rem; }
        .credits span { color: var(--accent); font-weight: bold; }

        @media (max-width: 600px) {
            header, footer { flex-direction: column; justify-content: center; text-align: center; }
            .nav-controls { justify-content: center; width: 100%; }
            .btn { flex: 1; justify-content: center; }
            .frame-header { flex-wrap: wrap; }
            .input-wrapper { order: -1; min-width: 100%; margin-bottom: 0.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Z<span>Frames</span>
        </div>
        <div class="nav-controls">
            <button class="btn btn-primary" onclick="addFrame()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Window
            </button>
        </div>
    </header>

    <main id="workspace"></main>

    <footer>
        <div class="credits">Developed & Designed by <span>Zelvior</span></div>
    </footer>

    <script>
        const workspace = document.getElementById('workspace');

        document.addEventListener('DOMContentLoaded', () => { addFrame(); });

        function addFrame() {
            const frameId = `frame-${Date.now()}`;
            const card = document.createElement('div');
            card.className = 'frame-card';
            card.id = frameId;

            card.innerHTML = `
                <div class="frame-header">
                    <button class="icon-btn" onclick="refreshFrame('${frameId}')" title="Refresh">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                    <div class="input-wrapper">
                        <input type="text" class="url-input" placeholder="Search or type URL..." onkeydown="handleEnter(event, '${frameId}')">
                        <button class="proxy-toggle" onclick="toggleProxy(this, '${frameId}')" title="Toggle Proxy if site refuses to connect">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            PROXY
                        </button>
                    </div>
                    <button class="icon-btn" onclick="triggerLoad('${frameId}')" title="Go">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                    <button class="icon-btn close" onclick="removeFrame('${frameId}')" title="Close Window">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="iframe-container">
                    <div class="frame-overlay" id="overlay-${frameId}">
                        <div class="spinner" id="spinner-${frameId}"></div>
                        <span id="status-${frameId}">Type a web address or search query to begin.<br><br><span style="color:var(--text-secondary); font-size: 0.85em;">Using native IP. If screen stays blank, click PROXY.</span></span>
                    </div>
                    <iframe id="iframe-${frameId}" src="" 
                            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox" 
                            onload="frameLoaded('${frameId}')">
                    </iframe>
                </div>
            `;
            workspace.appendChild(card);
            card.querySelector('.url-input').focus();
        }

        function handleEnter(event, frameId) {
            if (event.key === 'Enter') triggerLoad(frameId);
        }

        function toggleProxy(btn, frameId) {
            btn.classList.toggle('active');
            triggerLoad(frameId);
        }

        function triggerLoad(frameId) {
            const card = document.getElementById(frameId);
            const input = card.querySelector('.url-input');
            const iframe = card.querySelector('iframe');
            const isProxyActive = card.querySelector('.proxy-toggle').classList.contains('active');
            
            let val = input.value.trim();
            if (!val) return;

            document.getElementById(`overlay-${frameId}`).style.display = 'flex';
            document.getElementById(`spinner-${frameId}`).style.display = 'block';
            document.getElementById(`status-${frameId}`).innerText = isProxyActive ? 'Routing through secure proxy...' : 'Connecting via native IP...';

            let processedUrl = val;

            if (val.includes(' ') || (!val.includes('.') && !val.includes('localhost'))) {
                processedUrl = `https://www.google.com/search?igu=1&q=${encodeURIComponent(val)}`;
            } else {
                if (!/^https?:\/\//i.test(val)) {
                    processedUrl = `https://${val}`;
                }
                
                // ONLY use proxy if the user explicitly clicked the toggle
                if (isProxyActive) {
                    processedUrl = `https://corsproxy.io/?${encodeURIComponent(processedUrl)}`;
                }
            }

            // Keep the input looking clean if not proxying
            if(!isProxyActive && input.value !== processedUrl && !val.includes(' ')) {
                input.value = processedUrl;
            }

            iframe.src = processedUrl;
        }

        function frameLoaded(frameId) {
            const iframe = document.getElementById(`iframe-${frameId}`);
            if(iframe.src && iframe.src !== window.location.href && iframe.src !== 'about:blank') {
                document.getElementById(`overlay-${frameId}`).style.display = 'none';
            }
        }

        function refreshFrame(frameId) {
            triggerLoad(frameId);
        }

        function removeFrame(frameId) {
            const card = document.getElementById(frameId);
            if (card) card.remove();
        }
    </script>
</body>
</html>
